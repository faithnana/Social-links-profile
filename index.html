<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <title>Social links profile</title>
</head>
<body>
  <main>
    <article class="profile-card">
      <figure>
        <img src="images/avatar-jessica.jpeg" alt="Jessica Randall portrait">
      </figure>
      
      <h1>Jessica Randall</h1>

      <address>
        <p>London, United Kingdom</p>
      </address>

      <p class="profession">&ldquo;Front-end developer and avid reader.&rdquo;</p>
      
      <ul class="social-links">
        <li><a href="#">GitHub</a></li>
        <li><a href="#">Frontend Mentor</a></li>
        <li><a href="#">LinkedIn</a></li>
        <li><a href="#">Twitter</a></li>
        <li><a href="#">Instagram</a></li>
      </ul>

    </article>
  </main>
</body>
</html>
